<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policy — CrocoFocus</title>
  <meta name="description" content="Privacy Policy for the CrocoFocus iOS app.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            croco: {
              DEFAULT: '#58CC02',
              light:   '#8EE820',
              belly:   '#C8F06A',
              dark:    '#3A8E00',
              outline: '#236200',
            },
            sleep: '#9B8EC4',
            canvas: '#FAFAF8',
          },
          fontFamily: {
            sans: ['Nunito', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <style>
    html  { scroll-behavior: smooth; }
    body  { font-family: 'Nunito', sans-serif; background-color: #FAFAF8; color: #1C1C1E; }
    .prose h2 { font-size: 1.4rem; font-weight: 700; margin-top: 2.5rem; margin-bottom: 0.75rem; color: #1C1C1E; }
    .prose p, .prose li { color: #374151; line-height: 1.8; margin-bottom: 0.75rem; }
    .prose ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
    .prose a { color: #58CC02; text-decoration: underline; }
  </style>
</head>

<body>

  <!-- ===================== NAV ===================== -->
  <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 bg-white/90 backdrop-blur-md shadow-sm border-b border-gray-100">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">

      <a href="../" class="flex items-center gap-2.5 group">
        <img src="../assets/images/croco_head_left.svg" alt="Croco mascot" class="w-9 h-9 transition-transform group-hover:rotate-6 duration-300">
        <span class="text-xl font-extrabold text-croco tracking-tight">CrocoFocus</span>
      </a>

      <div class="hidden md:flex items-center gap-8">
        <a href="../support/" class="text-sm font-semibold text-gray-500 hover:text-croco transition-colors duration-200">Support</a>
        <a href="../privacy/" class="text-sm font-semibold text-croco transition-colors duration-200">Privacy</a>
        <a href="../#download" class="text-sm font-bold bg-croco hover:bg-croco-dark text-white px-5 py-2.5 rounded-full transition-colors duration-200 shadow-sm">
          Download
        </a>
      </div>

    </div>
  </nav>
  <!-- ===================== /NAV ===================== -->


  <main class="pt-32 pb-24">
    <div class="max-w-2xl mx-auto px-6">

      <!-- Page header -->
      <div class="mb-12" data-aos="fade-up">
        <span class="inline-block text-xs font-bold uppercase tracking-widest text-croco bg-croco/10 px-3 py-1 rounded-full mb-4">Legal</span>
        <h1 class="text-4xl font-extrabold mb-3">Privacy Policy</h1>
        <p class="text-gray-500 font-semibold">Last updated: June 2026</p>
      </div>

      <!-- Content — Step 7 -->
      <div class="prose" data-aos="fade-up" data-aos-delay="100">
        <!-- Privacy policy content will be added in Step 7 -->
        <p class="text-gray-400 italic">Privacy policy content coming soon.</p>
      </div>

    </div>
  </main>


  <!-- ===================== FOOTER ===================== -->
  <footer class="border-t border-gray-100 bg-white py-12">
    <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-6 text-sm">

      <a href="../" class="flex items-center gap-2 group">
        <img src="../assets/images/croco_head_left.svg" alt="Croco" class="w-6 h-6 transition-transform group-hover:rotate-6 duration-300">
        <span class="font-extrabold text-gray-800">CrocoFocus</span>
      </a>

      <nav class="flex gap-6 font-semibold text-gray-500">
        <a href="../privacy/" class="text-croco">Privacy Policy</a>
        <a href="../support/" class="hover:text-croco transition-colors duration-200">Support</a>
      </nav>

      <p class="text-gray-400">© 2026 CrocoFocus. All rights reserved.</p>

    </div>
  </footer>
  <!-- ===================== /FOOTER ===================== -->


  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 700, easing: 'ease-out-cubic', once: true });
  </script>

</body>
</html>
